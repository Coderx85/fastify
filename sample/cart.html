<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple Cart Simulation</title>
    <style>
      * {
        color: #fff;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: black;
      }
      #products,
      #cart {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .card {
        border: 1px solid #ccc;
        padding: 10px;
        width: 150px;
        background: #000;
      }
      button {
        margin-top: 5px;
        background: linear-gradient(90deg, #00f, #0ff);
        width: 100%;
        color: #ccc;
        border: none;
        padding: 5px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input {
        margin-bottom: 5px;
        padding: 5px;
        width: 200px;
        background-color: #222;
        border: 1px solid #555;
        color: #fff;
      }
      .cart-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .cart-item button {
        width: auto;
        padding: 2px 8px;
        margin: 0;
      }
      .cart-total {
        margin-top: 10px;
        font-size: 1.2em;
        font-weight: bold;
        color: #0ff;
      }
      .error-msg {
        color: #f66;
        margin-top: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1 style="color: #fff">Products</h1>

    <div
      style="
        margin-bottom: 20px;
        color: #fff;
        display: flex;
        flex-direction: column;
        gap: 7px;
      "
    >
      <h3>Billing Address</h3>
      <input
        id="billingStreetAddress1"
        value="456 Park Avenue"
        placeholder="Street address 1"
      /><br />
      <input
        id="billingStreetAddress2"
        placeholder="Street address 2 (opt)"
      /><br />
      <input id="billingCity" value="Los Angeles" placeholder="City" /><br />
      <input id="billingState" value="CA" placeholder="State" /><br />
      <input
        id="billingPostalCode"
        value="90001"
        placeholder="Postal code"
      /><br />
      <input id="billingCountry" value="USA" placeholder="Country" /><br />
      <h3>Shipping Address</h3>
      <input
        id="shippingStreetAddress1"
        value="123 Main Street"
        placeholder="Street address 1"
      /><br />
      <input
        id="shippingStreetAddress2"
        placeholder="Street address 2 (opt)"
      /><br />
      <input id="shippingCity" value="New York" placeholder="City" /><br />
      <input id="shippingState" value="NY" placeholder="State" /><br />
      <input
        id="shippingPostalCode"
        value="10001"
        placeholder="Postal code"
      /><br />
      <input id="shippingCountry" value="USA" placeholder="Country" /><br />
    </div>
    <div id="products"></div>

    <h2>Your Cart</h2>
    <div id="cart"></div>
    <div id="cartTotal" class="cart-total"></div>
    <div id="errorMsg" class="error-msg"></div>
    <button id="checkoutBtn">Checkout</button>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      const SERVER_API_URL = "http://localhost:4000"; // change if server runs elsewhere
      const productsEl = document.getElementById("products");
      const cartEl = document.getElementById("cart");
      const cartTotalEl = document.getElementById("cartTotal");
      const errorMsgEl = document.getElementById("errorMsg");
      const checkoutBtn = document.getElementById("checkoutBtn");
      let cart = [];
      let productMap = {}; // id -> product object (with prices)

      function formatPrice(amount, currency = "INR") {
        if (currency.toLowerCase() === "inr") {
          return amount.toLocaleString("en-IN", {
            style: "currency",
            currency: "INR",
            minimumFractionDigits: 2,
          });
        }
        return amount.toLocaleString("en-US", {
          style: "currency",
          currency: currency.toUpperCase(),
          minimumFractionDigits: 2,
        });
      }

      function clearError() {
        errorMsgEl.textContent = "";
      }

      function showError(msg) {
        errorMsgEl.textContent = msg;
      }

      async function loadProducts() {
        try {
          const res = await fetch(`${SERVER_API_URL}/api/products`);
          const json = await res.json();
          const products = json?.data?.products || [];
          productsEl.innerHTML = "";
          products.forEach((p) => {
            productMap[p.id] = p; 
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
              <strong>${p.name}</strong><br>
              <small class="muted">${p.category}</small><br>
              ${p.description || ""}<br>
              ${formatPrice(p.rates.inr, "inr")}<br>
              <button class="add-to-cart-btn">Add</button>
            `;
            div
              .querySelector("button")
              .addEventListener("click", () => addToCart(p));
            productsEl.appendChild(div);
          });
        } catch (e) {
          console.error("error loading products", e);
          productsEl.textContent = "Failed to load products";
        }
      }

      function addToCart(product) {
        clearError();
        const existing = cart.find((i) => i.productId === product.id);
        if (existing) existing.quantity++;
        else
          cart.push({
            productId: product.id,
            quantity: 1,
            name: product.name,
            priceInr: product.rates?.inr || 0,
          });
        renderCart();
      }

      function renderCart() {
        cartEl.innerHTML = "";
        let total = 0;
        cart.forEach((i, idx) => {
          const itemTotal = i.priceInr * i.quantity;
          total += itemTotal;
          const div = document.createElement("div");
          div.className = "cart-item";
          div.innerHTML = `
            <span>${i.name} &times; ${i.quantity} = ${formatPrice(itemTotal, "inr")}</span>
            <button data-index="${idx}" class="qty-minus">&minus;</button>
            <button data-index="${idx}" class="qty-plus">+</button>
            <button data-index="${idx}" class="remove-btn">&times;</button>
          `;
          div.querySelector(".qty-minus").addEventListener("click", (e) => {
            const index = Number(e.target.getAttribute("data-index"));
            if (cart[index].quantity > 1) cart[index].quantity--;
            else cart.splice(index, 1);
            renderCart();
          });
          div.querySelector(".qty-plus").addEventListener("click", (e) => {
            const index = Number(e.target.getAttribute("data-index"));
            cart[index].quantity++;
            renderCart();
          });
          div.querySelector(".remove-btn").addEventListener("click", (e) => {
            const index = Number(e.target.getAttribute("data-index"));
            cart.splice(index, 1);
            renderCart();
          });
          cartEl.appendChild(div);
        });
        cartTotalEl.textContent =
          cart.length > 0 ? `Total: ${formatPrice(total, "inr")}` : "";
      }

      async function checkout() {
        clearError();
        if (cart.length === 0) {
          alert("Cart is empty");
          return;
        }
        const billing = {
          streetAddress1: document.getElementById("billingStreetAddress1")
            .value,
          streetAddress2: document.getElementById("billingStreetAddress2")
            .value,
          city: document.getElementById("billingCity").value,
          state: document.getElementById("billingState").value,
          postalCode: document.getElementById("billingPostalCode").value,
          country: document.getElementById("billingCountry").value,
        };
        const shipping = {
          streetAddress1: document.getElementById("shippingStreetAddress1")
            .value,
          streetAddress2: document.getElementById("shippingStreetAddress2")
            .value,
          city: document.getElementById("shippingCity").value,
          state: document.getElementById("shippingState").value,
          postalCode: document.getElementById("shippingPostalCode").value,
          country: document.getElementById("shippingCountry").value,
        };

        checkoutBtn.disabled = true;
        checkoutBtn.textContent = "Processing\u2026";

        try {
          // Initiate payment with Razorpay
          const paymentResp = await fetch(
            `${SERVER_API_URL}/api/payment/initiate`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                userId: 1, // In production, use actual user ID from auth
                paymentMethod: "razorpay",
                products: cart.map((i) => ({
                  productId: i.productId,
                  quantity: i.quantity,
                })),
                billingAddress: billing,
                shippingAddress: shipping,
              }),
            },
          );
          const paymentBody = await paymentResp.json();
          if (![200, 201].includes(paymentResp.status)) {
            console.error("payment initiation failed", paymentBody);
            const detail =
              paymentBody?.message ||
              paymentBody?.error?.message ||
              JSON.stringify(paymentBody, null, 2);
            showError(`Payment initiation failed:\n${detail}`);
            return;
          }
          const { providerOrderId, razorpayKeyId } = paymentBody?.data || {};
          if (!providerOrderId) {
            showError(
              "Invalid payment response \u2014 no providerOrderId received.",
            );
            return;
          }
          // Open Razorpay checkout
          const options = {
            key: razorpayKeyId || "rzp_test_YOUR_KEY_ID", 
            order_id: providerOrderId,
            handler: function (response) {
              alert(
                "Payment successful! Payment ID: " +
                  response.razorpay_payment_id,
              );
              cart = [];
              renderCart();
            },
            modal: {
              ondismiss: function () {
                showError("Payment cancelled by user.");
              },
            },
            prefill: {
              email: "customer@example.com",
              contact: "9999999999",
            },
          };
          new Razorpay(options).open();
        } catch (err) {
          console.error("checkout error", err);
          showError(`Checkout failed: ${err.message || err}`);
        } finally {
          checkoutBtn.disabled = false;
          checkoutBtn.textContent = "Checkout";
        }
      }

      checkoutBtn.addEventListener("click", checkout);
      loadProducts();
    </script>
  </body>
</html>
